
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Application | Placement Prep Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="pb-5">
    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-briefcase me-2"></i>
                Placement Prep Tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="container mt-5 pt-3">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
                <div class="glass-card p-5">
                    <div class="mb-5 pb-3 border-bottom" style="border-color: rgba(255,255,255,0.08);">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-building-add" style="color: #667eea; font-size: 3rem; margin-right: 1rem;"></i>
                            <div>
                                <h2 class="mb-1 text-white fw-bold">Add New Application</h2>
                                <p class="mb-0" style="color: #CBD5E1;">Track your job application process</p>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/company/save}" method="post" th:object="${company}">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="name" class="form-label">
                                    <i class="bi bi-building me-2"></i>Company Name *
                                </label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required placeholder="e.g. Google, Microsoft">
                                <div th:if="${#fields.hasErrors('name')}" class="text-danger small mt-2">
                                    <i class="bi bi-exclamation-circle me-1"></i>
                                    <span th:errors="*{name}"></span>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="role" class="form-label">
                                    <i class="bi bi-briefcase me-2"></i>Role *
                                </label>
                                <input type="text" class="form-control" id="role" th:field="*{role}" required placeholder="e.g. Software Engineer, Product Manager">
                                <div th:if="${#fields.hasErrors('role')}" class="text-danger small mt-2">
                                    <i class="bi bi-exclamation-circle me-1"></i>
                                    <span th:errors="*{role}"></span>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="status" class="form-label">
                                    <i class="bi bi-flag me-2"></i>Application Status *
                                </label>
                                <select class="form-select" id="status" th:field="*{status}" required>
                                    <option value="">Select Status</option>
                                    <option value="Applied">Applied</option>
                                    <option value="OA">Online Assessment</option>
                                    <option value="Interview">Interview</option>
                                    <option value="Selected">Selected</option>
                                    <option value="Rejected">Rejected</option>
                                </select>
                                <div th:if="${#fields.hasErrors('status')}" class="text-danger small mt-2">
                                    <i class="bi bi-exclamation-circle me-1"></i>
                                    <span th:errors="*{status}"></span>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="interviewDate" class="form-label">
                                    <i class="bi bi-calendar-event me-2"></i>Interview Date (Optional)
                                </label>
                                <input type="date" class="form-control" id="interviewDate" th:field="*{interviewDate}">
                            </div>

                            <div class="col-12">
                                <label for="notes" class="form-label">
                                    <i class="bi bi-sticky me-2"></i>Notes (Optional)
                                </label>
                                <textarea class="form-control" id="notes" th:field="*{notes}" rows="5" placeholder="Add any relevant notes about this application, process, or preparation..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-6 pt-4 border-top" style="border-color: rgba(255,255,255,0.08);">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="bi bi-check-circle me-2"></i>
                                Save Application
                            </button>
                            <a th:href="@{/}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>
                                Back to Dashboard
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
